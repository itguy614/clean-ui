name: Publish to npm

# Publish only when a release reaches master (e.g. the develop → master release
# PR merges). Pushing a version tag on develop must NOT publish. The version
# check makes this idempotent: ordinary master pushes that don't bump the
# version (and re-runs) are skipped, so only a new version actually publishes.
on:
  push:
    branches:
      - master

permissions:
  contents: write # create GitHub Releases

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Check whether this version is already published
        id: check
        working-directory: packages/clean-ui
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already on npm — skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$NAME@$VERSION is new — will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build library
        if: steps.check.outputs.publish == 'true'
        run: pnpm --filter @itguy614/clean-ui build

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        working-directory: packages/clean-ui
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          # Extract this version's section from CHANGELOG.md (between its
          # heading and the next "## [" heading) to use as the release notes.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi
          gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
